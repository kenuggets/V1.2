<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Launchpad</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="/dashboard.html" class="logo">Launchpad</a>
  <nav>
    <a href="/discover.html">Discover</a>
    <a href="/build.html">Build</a>
    <a href="/prepare.html">Prepare</a>
    <a href="/dashboard.html">Dashboard</a>
  </nav>
  <div class="user-chip"><span id="nav-name">You</span></div>
</nav>

<div class="container" style="padding-top:2rem;padding-bottom:3rem">

  <div class="page-header-inner">
    <h2>Profile & Settings</h2>
    <p>Update your details. Every module uses your profile for personalised advice.</p>
  </div>

  <div class="grid-2" style="align-items:flex-start">

    <!-- Edit Profile -->
    <div class="card">
      <h4 style="margin-bottom:1.5rem">Your Profile</h4>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="grid-2">
          <div class="form-group"><label>Full Name</label><input type="text" id="p-name" /></div>
          <div class="form-group"><label>Email</label><input type="email" id="p-email" /></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label>University</label><input type="text" id="p-uni" /></div>
          <div class="form-group"><label>Degree</label><input type="text" id="p-degree" /></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label>Year of Study</label>
            <select id="p-year">
              <option value="">Select</option>
              <option>Year 1</option><option>Year 2</option><option>Year 3</option>
              <option>Year 4</option><option>Masters</option><option>Postgrad</option>
            </select>
          </div>
          <div class="form-group"><label>Graduation Year</label><input type="text" id="p-grad" placeholder="2026" /></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label>Location</label><input type="text" id="p-location" placeholder="Sydney, Australia" /></div>
          <div class="form-group"><label>Target Sector</label>
            <select id="p-sector">
              <option value="">Select</option>
              <optgroup label="Finance">
                <option>Investment Banking</option><option>Corporate Finance</option>
                <option>Asset Management</option><option>Private Equity / Venture Capital</option>
                <option>Accounting (Big 4)</option><option>Financial Planning & Wealth</option>
              </optgroup>
              <optgroup label="Professional Services">
                <option>Management Consulting</option><option>Law</option><option>Actuarial</option>
              </optgroup>
              <optgroup label="Technology">
                <option>Software Engineering</option><option>Product Management</option>
                <option>Data Science & Analytics</option><option>Cybersecurity</option>
              </optgroup>
              <optgroup label="Other Industries">
                <option>Engineering</option><option>Healthcare & Medicine</option>
                <option>Marketing & Advertising</option><option>Government & Public Policy</option>
                <option>Non-profit & Social Impact</option><option>Real Estate</option>
              </optgroup>
              <option value="unsure">I'm not sure yet</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Career Stage</label>
          <select id="p-stage">
            <option value="exploring">Exploring — not sure yet</option>
            <option value="decided">Decided — building towards a role</option>
            <option value="applying">Applying — sending applications</option>
            <option value="interviewing">Interviewing — have interviews lined up</option>
          </select>
        </div>
        <div class="form-group">
          <label>Skills (press Enter to add)</label>
          <div class="tag-input" id="p-skills-tags"></div>
          <input type="text" id="p-skills-input" placeholder="Add a skill..." onkeydown="addTag(event,'skills')" style="margin-top:0.5rem" />
        </div>
        <div class="form-group">
          <label>Target Roles (press Enter to add)</label>
          <div class="tag-input" id="p-roles-tags"></div>
          <input type="text" id="p-roles-input" placeholder="Add a target role..." onkeydown="addTag(event,'roles')" style="margin-top:0.5rem" />
        </div>
        <div class="form-group">
          <label>Notes / Anything else we should know</label>
          <textarea id="p-notes" placeholder="e.g. I find networking difficult, I'm targeting spring weeks specifically..." style="min-height:70px"></textarea>
        </div>
        <button class="btn btn-primary w-full" onclick="saveProfile()">Save changes</button>
        <hr class="divider" />
        <button class="btn btn-danger w-full btn-sm" onclick="resetAccount()">Reset account & start over</button>
      </div>
    </div>

    <!-- Stats & Badges -->
    <div style="display:flex;flex-direction:column;gap:1.5rem">
      <div class="card">
        <h4 style="margin-bottom:1.25rem">Your Stats</h4>
        <div style="display:flex;flex-direction:column;gap:0.75rem">
          <div style="display:flex;justify-content:space-between;font-size:0.9rem"><span style="color:var(--muted)">Current streak</span><span id="s-streak" style="color:var(--gold);font-weight:700">—</span></div>
          <div style="display:flex;justify-content:space-between;font-size:0.9rem"><span style="color:var(--muted)">Longest streak</span><span id="s-longest" style="color:var(--white);font-weight:600">—</span></div>
          <div style="display:flex;justify-content:space-between;font-size:0.9rem"><span style="color:var(--muted)">Applications sent</span><span id="s-apps" style="color:var(--white);font-weight:600">—</span></div>
          <div style="display:flex;justify-content:space-between;font-size:0.9rem"><span style="color:var(--muted)">Contacts reached</span><span id="s-contacts" style="color:var(--white);font-weight:600">—</span></div>
          <div style="display:flex;justify-content:space-between;font-size:0.9rem"><span style="color:var(--muted)">Coffee chats</span><span id="s-chats" style="color:var(--white);font-weight:600">—</span></div>
        </div>
      </div>

      <div class="card">
        <h4 style="margin-bottom:1.25rem">All Milestone Badges</h4>
        <div id="all-badges" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const userId = localStorage.getItem('userId');
if (!userId) location.href = '/signup.html';

const skills = [], roles = [];

const BADGE_DEFS = [
  { slug: 'skills_gap_done',      icon: '🧠', name: 'Self-Aware',        desc: 'Completed skills gap' },
  { slug: 'first_outreach',       icon: '📬', name: 'First Outreach',    desc: 'Sent cold message' },
  { slug: 'cv_started',           icon: '📄', name: 'CV Builder',        desc: 'Started your CV' },
  { slug: 'first_application',    icon: '📋', name: 'First Application', desc: 'Applied to a role' },
  { slug: 'first_coffee_chat',    icon: '☕', name: 'Coffee Chat',       desc: 'Booked a coffee chat' },
  { slug: 'first_interview_prep', icon: '🎤', name: 'Interview Ready',   desc: 'Did a mock interview' },
  { slug: 'audio_practice',       icon: '🎙️', name: 'Voice Coach',       desc: 'Used audio feedback' },
  { slug: 'offer_received',       icon: '🏆', name: 'Offer Received',    desc: 'Landed an internship!' },
];

window.onload = async () => {
  try {
    const res  = await fetch(`/api/user/${userId}`);
    const data = await res.json();
    const u = data.user;
    document.getElementById('nav-name').textContent = (u.name || 'You').split(' ')[0];
    document.getElementById('p-name').value     = u.name || '';
    document.getElementById('p-email').value    = u.email || '';
    document.getElementById('p-uni').value      = u.university || '';
    document.getElementById('p-degree').value   = u.degree || '';
    document.getElementById('p-year').value     = u.year_of_study || '';
    document.getElementById('p-grad').value     = u.graduation_year || '';
    document.getElementById('p-location').value = u.location || '';
    document.getElementById('p-sector').value   = u.target_sector || '';
    document.getElementById('p-stage').value    = u.career_stage || 'exploring';
    document.getElementById('p-notes').value    = u.personality_notes || '';

    (u.skills || []).forEach(s => addTagDirect('skills', s));
    (u.target_roles || []).forEach(r => addTagDirect('roles', r));

    // Stats
    const s = data.streak;
    document.getElementById('s-streak').textContent  = `🔥 ${s.current_streak} days`;
    document.getElementById('s-longest').textContent = `${s.longest_streak} days`;

    // Badges
    const earned = new Set(data.milestones.map(m => m.badge_slug));
    const grid = document.getElementById('all-badges');
    BADGE_DEFS.forEach(b => {
      const div = document.createElement('div');
      div.className = `milestone-badge${earned.has(b.slug) ? '' : ' locked'}`;
      div.innerHTML = `<div class="icon">${b.icon}</div><div class="name">${b.name}</div><div class="desc">${b.desc}</div>`;
      grid.appendChild(div);
    });
  } catch(e) { showToast('Could not load profile.', 'error'); }

  try {
    const res2 = await fetch(`/api/gamification/dashboard/${userId}`);
    const d2 = await res2.json();
    document.getElementById('s-apps').textContent     = d2.stats.applications;
    document.getElementById('s-contacts').textContent = d2.stats.contacts_reached;
    document.getElementById('s-chats').textContent    = d2.stats.coffee_chats;
  } catch(e) {}
};

function addTag(e, type) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const input = document.getElementById(`p-${type === 'skills' ? 'skills' : 'roles'}-input`);
  addTagDirect(type, input.value.trim());
  input.value = '';
}

function addTagDirect(type, val) {
  if (!val) return;
  const arr = type === 'skills' ? skills : roles;
  if (arr.includes(val)) return;
  arr.push(val);
  const container = document.getElementById(`p-${type === 'skills' ? 'skills' : 'roles'}-tags`);
  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.innerHTML = `${val} <span class="remove" onclick="removeTag(this,'${type}','${val}')">✕</span>`;
  container.appendChild(tag);
}

function removeTag(el, type, val) {
  const arr = type === 'skills' ? skills : roles;
  const i = arr.indexOf(val); if (i > -1) arr.splice(i, 1);
  el.parentElement.remove();
}

async function saveProfile() {
  const name  = document.getElementById('p-name').value.trim();
  const email = document.getElementById('p-email').value.trim();
  if (!name || !email) { showToast('Name and email are required.', 'error'); return; }
  const profile = {
    name, email,
    university: document.getElementById('p-uni').value.trim(),
    degree: document.getElementById('p-degree').value.trim(),
    year_of_study: document.getElementById('p-year').value,
    graduation_year: document.getElementById('p-grad').value.trim(),
    location: document.getElementById('p-location').value.trim(),
    target_sector: document.getElementById('p-sector').value,
    career_stage: document.getElementById('p-stage').value,
    personality_notes: document.getElementById('p-notes').value.trim(),
    skills: [...skills],
    target_roles: [...roles],
    experience: [],
  };
  try {
    await fetch('/api/user/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(profile) });
    localStorage.setItem('userName', name);
    showToast('Profile saved ✓', 'success');
  } catch(e) { showToast('Error saving.', 'error'); }
}

function resetAccount() {
  if (!confirm('This will clear your local session. Your data stays saved on the server. Continue?')) return;
  localStorage.clear();
  location.href = '/';
}

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 4000);
}
</script>
</body>
</html>
